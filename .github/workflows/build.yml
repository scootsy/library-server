name: Build

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Install Go dependencies
        run: go mod download

      # mattn/go-sqlite3 compiles its own bundled SQLite amalgamation via CGo.
      # The `fts5` build tag passes -DSQLITE_ENABLE_FTS5 to that compilation,
      # enabling the FTS5 full-text search module used by the works_fts table.
      # gcc is pre-installed on ubuntu-latest; no extra apt packages are needed.
      - name: Build
        run: go build -tags fts5 ./...

      - name: Test
        run: go test -tags fts5 -race ./...

  # The frontend (SvelteKit) is a Phase 3 deliverable. The Node.js build job
  # will be added to this workflow when the web/ directory is introduced.

